name: file_share_app
description: "A real-time file sharing app built with Flutter, Firebase, and Supabase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  supabase_flutter: ^2.8.1
  provider: ^6.1.2
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  dio: ^5.7.0
  permission_handler: ^11.3.1
  open_filex: ^4.5.0
  intl: ^0.20.2
  uuid: ^4.5.1
  nearby_connections: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
